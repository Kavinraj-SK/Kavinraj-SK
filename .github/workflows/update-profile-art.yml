name: Update profile art

on:
  schedule:
    - cron: "17 3 * * *"   # ~daily, off the top of the hour
  workflow_dispatch: {}     # allow manual "Run workflow" trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: Kavinraj-SK
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/contributions.json contrib-heatmap.svg; then
            git add data/contributions.json contrib-heatmap.svg
            git commit -m "chore: refresh contribution heatmap"
            git push
          else
            echo "no changes"
          fi
